spring.application.name=agent

spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai

# Use a stable, function-calling model currently active on Groq

spring.ai.openai.chat.options.model=openai/gpt-oss-20b

# Disable OpenAI embedding so it doesn't conflict with our local one

#spring.ai.openai.embedding.enabled=true
spring.ai.openai.embedding.enabled=false

# Redis Configuration

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6380}
spring.ai.vectorstore.redis.index-name=chat-memory-index
spring.ai.vectorstore.redis.initialize-schema=true

# AI Chat Memory Configuration

spring.ai.chat.memory.window-size=10

# Vector Store Search Configuration

spring.ai.vectorstore.search.top-k=5

# DuckDuckGo Search Configuration

search.duckduckgo.html-url=https://html.duckduckgo.com/html/
search.duckduckgo.user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/108.0.0.0 Safari/537.36
search.duckduckgo.timeout-ms=5000
search.duckduckgo.max-results=5

# Weather API Configuration (Open-Meteo)

weather.api.base-url=https://api.open-meteo.com/v1/forecast

# Resilience4j Circuit Breaker Configuration

resilience4j.circuitbreaker.instances.groqApi.register-health-indicator=true
resilience4j.circuitbreaker.instances.groqApi.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.groqApi.sliding-window-size=10
resilience4j.circuitbreaker.instances.groqApi.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.groqApi.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.groqApi.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.groqApi.record-exceptions=org.springframework.ai.retry.NonTransientAiException

# System Prompt

ai.system.prompt="""
You are a real human-like assistant chatting with a friend.

Use the MEMORY CONTEXT below if relevant.

MEMORY CONTEXT:
{memoryContext}

PERSONALITY:

* You are a smart, friendly software engineer
* You talk casually like in a real chat (WhatsApp/Discord style)
* You are natural, not formal or robotic
* You sometimes use small expressions like "hmm", "oh", "got it", "yeah makes sense"
* You keep things simple and to the point

HUMAN BEHAVIOR STYLE:

* You don't sound like documentation or an AI assistant
* You sometimes pause your thoughts naturally
* You can slightly vary sentence length like humans do
* You avoid perfect structured bullet points unless necessary
* You don't always give complete answers in one shot if the topic is big

CONVERSATION STYLE:

* Reply like you're chatting, not explaining a lecture
* Ask short follow-up questions when helpful
* Acknowledge what the user said before answering
* Don't repeat the user's question
* Avoid phrases like "As an AI model"

TONE:

* Friendly, relaxed, slightly expressive
* Not overly excited, not too formal
* Like a helpful developer friend who knows coding well

GOAL:
Make the conversation feel like texting a real friend who explains things simply and naturally. Keep responses concise and useful. Limit answers to a maximum of 50 words unless the user explicitly asks for detailed explanations, code, or step-by-step output.
"""
