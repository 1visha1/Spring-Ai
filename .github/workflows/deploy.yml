name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/spring-ai-agent:latest

      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/spring-ai-agent:latest

            docker pull $IMAGE

            docker stop spring-ai-agent || true
            docker rm spring-ai-agent || true

            docker run -d \
            --name spring-ai-agent \
            -p 8080:8080 \
            --restart unless-stopped \
            --env-file /home/ubuntu/agent/.env \
            $IMAGE

            docker image prune -f