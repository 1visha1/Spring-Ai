services:

redis:
image: redis/redis-stack:latest
container_name: redis-stack

restart: unless-stopped

ports:
  - "6380:6379"
  - "8001:8001"

volumes:
  - redis_data:/data

agent:
build:
context: .

container_name: spring-ai-agent

restart: unless-stopped

env_file:
  - .env

ports:
  - "8080:8080"

depends_on:
  - redis

volumes:
redis_data:
